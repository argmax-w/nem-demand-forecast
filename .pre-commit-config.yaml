# Hooks run the tools from the active environment so the versions match
# environment.yml and CI exactly.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types_or: [python]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python]
      - id: jupytext-sync
        name: jupytext sync
        entry: jupytext --sync
        language: system
        files: ^notebooks/.*\.(ipynb|py)$
