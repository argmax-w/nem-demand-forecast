# Configuration for day-ahead probabilistic forecasting of NSW1 operational demand.
#
# Storage and modelling are in UTC. The timezone below is NEM market time
# (AEST, UTC+10, no daylight saving), used for window boundaries, forecast
# origins and display. Prior scales for the BSTS apply to demand standardised
# on the fitting window.

region: NSW1
timezone: Australia/Brisbane
frequency: 30min
horizon: 48 # half-hourly steps, 24 hours from each origin
origins: ["00:00", "12:00"] # forecast issue times, market clock

grid_point:
  latitude: -33.87
  longitude: 151.21
  label: Sydney Observatory Hill

# Inclusive market-time days, period-start convention. The window is governed
# by archive depth: NEMWeb retains roughly thirteen months of half-hourly
# operational demand actuals, which binds before the weather forecast archive.
window:
  start: "2023-05-18"
  end: "2026-05-29"

splits:
  # Everything before eval_start (market time) is the contiguous training
  # block. Each month of the evaluation year contributes an early and a
  # late five-day window; a balanced seeded draw sends one to validation
  # and the other to test, so both span all twelve months with no fixed
  # position-in-month offset and no overlap with training.
  eval_start: "2025-06-01"
  early_window: [8, 12] # inclusive market-day range, first window of each month
  late_window: [19, 23] # inclusive market-day range, second window of each month
  seed: 20260613

demand:
  source: nemweb # nemosis | nemweb

weather:
  actuals_model: era5_seamless # ERA5 with the ERA5T tail for recent months
  # ECMWF IFS rather than the Bureau's ACCESS-G: the previous-runs archive
  # for bom_access_global is empty over this window (verified at download
  # time), while ecmwf_ifs025 carries full hourly coverage including the
  # irradiance fields.
  forecast_model: ecmwf_ifs025
  lead_days: 1
  # Modelled variables (actuals + day-ahead forecast). Apparent temperature,
  # global horizontal irradiance and wind speed were added after the notebook
  # 01 EDA showed they cut validation error in their transformed forms
  # (apparent degree days, GHI, wind x heating); see eda_variables for the
  # full candidate set that justification screened.
  variables:
    [
      temperature_2m,
      dew_point_2m,
      direct_normal_irradiance,
      diffuse_radiation,
      apparent_temperature,
      shortwave_radiation,
      wind_speed_10m,
    ]
  # Candidate variables screened in the notebook 01 EDA (ERA5 actuals only);
  # those that earned their place are promoted into variables above.
  eda_variables:
    [
      apparent_temperature,
      relative_humidity_2m,
      wind_speed_10m,
      wind_gusts_10m,
      cloud_cover,
      shortwave_radiation,
      surface_pressure,
      precipitation,
    ]
  heating_base: 16.5 # degrees C, demand rises below this
  cooling_base: 20.5 # degrees C, demand rises above this

features:
  # Seasonal basis for the daily and weekly cycles. The RBF counts are chosen
  # to match the trigonometric column counts (2K), so swapping the basis
  # holds model size fixed; the bases are assessed against each other on the
  # validation set in notebook 02.
  seasonal_basis: fourier # fourier | rbf
  daily_harmonics: 10
  weekly_harmonics: 6
  daily_rbf_centres: 20
  weekly_rbf_centres: 12
  # Demand lags, in half-hourly steps. Both stay behind the origin across a
  # 48-step horizon, so no recursive feedback is needed at forecast time.
  demand_lags: [48, 336]
  interaction_harmonics: 2 # degree days and weekend flag x daily harmonics

arima:
  # Candidate (p, d, q) orders for the regression residuals, selected on the
  # validation set. Seasonality and weather live in the exogenous regressors,
  # so the residual process is kept low order and stationary. The choice is
  # between a first- and a second-order autoregression, the classical mirror
  # of the BSTS AR([1,2]) error: the lag-2 term carries a slope at the origin.
  candidate_orders:
    - [1, 0, 0]
    - [2, 0, 0]

# Bayesian additive regression trees: the Bayesian counterpart to the
# LightGBM benchmark. Trees are discrete, so the model is fitted by its
# native particle-Gibbs sampler rather than ADVI or NUTS.
bart:
  trees: 50
  tune: 1000
  draws: 1000
  chains: 4

bsts:
  obs_family: gaussian # gaussian | student_t
  # The observation scale is a log-linear function of a small daily basis and
  # the degree-day terms, so predictive variance follows the covariates. The
  # coefficient priors are kept tight: the exp link compounds, and loose
  # scales hand the sampler a pathological geometry.
  heteroskedastic: true
  variance_daily_harmonics: 3
  variance_use_degree_days: true
  priors:
    coef_scale: 1.0 # Normal, regression coefficients
    obs_scale: 0.5 # HalfNormal, observation noise when homoskedastic
    var_intercept_loc: -1.5 # Normal, log observation scale at baseline
    var_intercept_scale: 0.7
    var_coef_scale: 0.25 # Normal, log-variance coefficients
    student_t_df_rate: 0.1 # Exponential rate for (df - 2) under student_t
    ar_alpha: 8.0 # Beta prior on phi1, the lag-1 partial autocorrelation of the AR(2) error
    ar_beta: 2.0

vi:
  steps: 20000
  learning_rate: 0.01
  num_particles: 8
  log_every: 100
  eval_particles: 64 # particles for the logged ELBO decomposition
  posterior_draws: 1000

nuts:
  chains: 4
  warmup: 1000
  samples: 1000
  target_accept: 0.85
  max_tree_depth: 10
  chain_method: vectorized

warm_start:
  reduced_warmup: [100, 300]
  target_bulk_ess: 400
  rhat_threshold: 1.01

perturbation:
  # Multiples of the fitted forecast-error magnitude swept at forecast time.
  sweep_multipliers: [0.0, 0.5, 1.0, 1.5, 2.0]

evaluation:
  quantiles: [0.05, 0.1, 0.25, 0.5, 0.75, 0.9, 0.95]
  interval_levels: [0.5, 0.8, 0.95]
  crps_chunk: 256 # posterior draws per chunk in the streaming CRPS

paths:
  raw: data/raw
  interim: data/interim
  processed: data/processed
  artifacts: artifacts
  figures: reports/figures

seed: 20260611
