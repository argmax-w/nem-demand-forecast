name: nem-demand-forecast
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy
  - pandas
  - polars
  - pyarrow
  - scipy
  - statsmodels
  - matplotlib
  - requests
  - pyyaml
  - holidays
  - lightgbm
  - arviz
  - numba
  - multipledispatch
  - jupyterlab
  - jupytext
  - nbconvert
  - ipykernel
  - pytest
  - ruff
  - pre-commit
  - pip
  - pip:
      # CPU wheels by default; on a CUDA machine install jax[cuda12] instead.
      - jax
      - numpyro
      - optax
      - nemosis
      # The conda-forge build of pymc 6.0.1 imports the removed pre-1.0
      # arviz API; the pip wheel of the same version carries the fix, so
      # these three come from pip until conda-forge catches up.
      - pymc
      - pytensor
      - pymc-bart
